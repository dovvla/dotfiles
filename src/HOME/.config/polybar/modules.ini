[module/bspwm]

type = internal/bspwm

pin-workspaces = true
inline-mode = false
enable-click = true
enable-scroll = true
reverse-scroll = true
fuzzy-match = true

format = <label-state>

label-monitor = ¾░ı╣ %name%
label-focused = %name%
label-occupied = %name%
label-urgent = %name%
label-empty = %name%

label-focused-foreground = ${color.fg}
label-focused-background = ${color.bg}
label-focused-underline  =  ${color.fg}
label-focused-padding = 1

label-occupied-foreground = ${color.fg}
label-occupied-background = ${color.bg}
label-occupied-underline  =  ${color.bg}
label-occupied-padding = 1

label-empty-foreground = ${color.mg}
label-empty-background = ${color.bg}
label-empty-underline  =  ${color.bg}
label-empty-padding = 1

label-urgent-foreground = ${color.amber}
label-urgent-background = ${color.bg}
label-urgent-underline  =  ${color.amber}
label-urgent-padding = 1

label-monitor-foreground = ${color.mg}

[module/date]

type = internal/date

interval = 1.0

time = ¾░àÉ %H:%M:%S
time-alt = ¾░â¡ %A, %d %B %Y

format = <label>
label = %time%
label-font = 5

[module/pulseaudio]

type = internal/pulseaudio

use-ui-max = true
interval = 2

label-volume = %percentage%%
label-muted = ¾░©ê %percentage%%
label-muted-foreground = ${color.fg}

format-volume = <ramp-volume><label-volume>

ramp-volume-0 = ¾░ò┐
ramp-volume-1 = ¾░ò┐
ramp-volume-2 = ¾░ûÇ
ramp-volume-3 = ¾░ûÇ
ramp-volume-4 = ¾░ûÇ
ramp-volume-5 = ¾░ò¥
ramp-volume-6 = ¾░ò¥

[module/wired]

type = internal/network

interface = ${env:ENP:}
interval = 3.0

ping-interval = 0
accumulate-stats = false
unknown-as-up = false

format-connected = ¾▒è¬ <label-connected>
format-disconnected = ¾░îÖ
format-packetloss = ¾░îÜ <label-connected>

format-disconnected-foreground = ${color.mg}

label-connected = %local_ip%
