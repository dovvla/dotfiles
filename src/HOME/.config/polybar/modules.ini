[module/wireless]

type = internal/network

interface = ${env:WLP:}
interval = 3.0

ping-interval = 0
accumulate-stats = false
unknown-as-up = false

format-connected = <ramp-signal> <label-connected>
format-disconnected = ¾░ñ«
format-packetloss = ¾░îÜ <label-connected>

format-disconnected-foreground = ${color.mg}

label-connected = %essid% %local_ip%
label-disconnected =

ramp-signal-0 = ¾░ñ»
ramp-signal-1 = ¾░ñş
ramp-signal-2 = ¾░ñş
ramp-signal-3 = ¾░ñó
ramp-signal-4 = ¾░ñÑ
ramp-signal-5 = ¾░ñ¿

[module/keyboard]

type = internal/xkeyboard

blacklist-0 = num lock
blacklist-1 = scroll lock

format = ¾░îô <label-layout><label-indicator>
format-spacing = 0

label-layout = %icon%
label-layout-padding = 0

label-indicator-on = +%name%
label-indicator-on-capslock = " ¾░îÄ"

layout-icon-default =
layout-icon-0 = us;eng
layout-icon-1 = rs;latin;srb
layout-icon-2 = rs;ªüªÇº▒

[module/battery]

type = internal/battery

full-at = 100
time-format = %H:%M
battery = BAT1
adapter = AC

label-charging = %percentage%% (%consumption% W)
label-full = %percentage%%
label-discharging = %percentage%% (%time%) %consumption% W

format-full = ¾░ÜÑ
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>

ramp-capacity-0 = ¾░ü║
ramp-capacity-1 = ¾░ü╗
ramp-capacity-2 = ¾░ü╝
ramp-capacity-3 = ¾░ü¢
ramp-capacity-4 = ¾░ü┐
ramp-capacity-5 = ¾░éÇ
ramp-capacity-6 = ¾░éé
ramp-capacity-7 = ¾░ü╣

animation-charging-0 = ¾░ó£
animation-charging-1 = ¾░éç
animation-charging-2 = ¾░óØ
animation-charging-3 = ¾░óŞ
animation-charging-4 = ¾░éï

animation-charging-framerate = 1000

;format-charging-underline = ${color.fg}
;format-discharging-underline = ${color.fg}
;format-full-underline = ${color.fg}

[module/filesystem]

type = internal/fs

mount-0 = /

interval = 10

fixed-values = false

spacing = 1

format-mounted = ¾░ïè <label-mounted>
format-unmounted = ¾▒üî <label-unmounted>

format-unmounted-foreground = ${color.mg}

label-mounted = %free%
label-unmounted = %mountpoint%

[module/memory]

type = internal/memory

interval = 2
warn-percentage = 80

label = %gb_used%
label-warn = %gb_used% %free% %swap_free%

format = ¾░İÜ <label>
format-warn = ¾░İÜ <label-warn> ¾▒¬ù

[module/cpu]

type = internal/cpu

interval = 2

label = %percentage-sum%%

format = ¾░ıø <label>

[module/temperature]

type = internal/temperature

interval = 3
thermal-zone = 0
hwmon-path = /tmp/.polybar_cpu_temp_hwmon

base-temperature = 50
warn-temperature = 80

units = true
format = <ramp><label>
format-warn = ¾░©ü <label-warn>
label = %temperature-c%
label-warn = %temperature-c%

ramp-0 = ¾▒ââ
ramp-1 = ¾░öÅ
ramp-2 = ¾▒âé

[module/fan]

type = custom/script

exec = awk '/^speed:/ { print ($2 > 0) ? ("¾░êÉ " $2) : "¾░áØ" }' /proc/acpi/ibm/fan
interval = 2
exec-if = test -e /proc/acpi/ibm/fan
tail = false

[module/host]

type = custom/script

exec = hostname --short
interval = 180
format = ¾░¬½ <label>
format-background = ${color.bg}
format-foreground = ${color.fg}

[module/updates]

type = custom/script

exec = paru -Qu | wc -l
exec-if = paru -Sy && yay -Qu | wc -l | xargs -I{} test {} -gt 0
tail = false
interval = 14400

label = %output%
format = ¾░úç <label>
format-background = ${color.bg}
format-foreground = ${color.fg}

click-left = $TERMINAL -e paru -Syu

[module/monitor]

type = custom/script

exec = echo $MONITOR
tail = false
interval = 3900

label = %output%
format = ¾░ı╣ <label>
format-background = ${color.bg}
format-foreground = ${color.fg}

[module/window_narrow]

type = internal/xwindow

format = <label>
label = ¾░û» %class:0:40:...%
label-maxlen = 40

[module/window_wide]

type = internal/xwindow

format = <label>
label = ¾░û» %title:0:80:...%
label-maxlen = 80

[module/playerctl]

type = custom/script

exec = "$HOME/.config/polybar/playerctl.sh"
exec-if = playerctl -a status | grep -q 'Playing\\|Paused'
tail = true
interval = 1

label = %output%
format = <label>
format-background = ${color.bg}
format-foreground = ${color.fg}

click-left = playerctl -a play-pause &
click-right = playerctl -a stop &
double-click-left = playerctl -a previous &
double-click-right = playerctl -a next &

[module/tray]

type = internal/tray

tray-spacing = 2px
tray-padding = 0px
tray-size = 20px
format-margin = 0px
tray-background = ${color.bg}
tray-foreground = ${color.fg}
